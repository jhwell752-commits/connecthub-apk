name: Build APK (Capacitor)

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: |
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Write Capacitor config
        run: |
          cat > capacitor.config.json << 'EOF'
          {
            "appId": "com.connecthub.app",
            "appName": "ConnectHub",
            "webDir": "www",
            "android": {
              "allowMixedContent": true,
              "backgroundColor": "#ffffff",
              "captureInput": true
            },
            "server": {
              "androidScheme": "https"
            },
            "plugins": {
              "CapacitorHttp": {
                "enabled": true
              }
            }
          }
          EOF

      - name: Prepare web assets
        run: |
          mkdir -p www
          cp index.html www/index.html

      - name: Add Android platform
        run: |
          npx cap init "ConnectHub" "com.connecthub.app" --web-dir www
          npx cap add android

      - name: Upgrade Gradle wrapper to 8.7
        run: |
          sed -i 's|gradle-[0-9.]*-all|gradle-8.7-all|g' android/gradle/wrapper/gradle-wrapper.properties
          grep distributionUrl android/gradle/wrapper/gradle-wrapper.properties

      # ── Overwrite AndroidManifest with a clean known-good version ──
      - name: Write AndroidManifest
        run: |
          cat > android/app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">

              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.CAMERA" />
              <uses-permission android:name="android.permission.RECORD_AUDIO" />
              <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
              <uses-permission android:name="android.permission.WAKE_LOCK" />
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />

              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="@string/app_name"
                  android:roundIcon="@mipmap/ic_launcher_round"
                  android:supportsRtl="true"
                  android:theme="@style/AppTheme"
                  android:usesCleartextTraffic="true"
                  android:hardwareAccelerated="true">

                  <activity
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|locale|smallestScreenSize|screenLayout|uiMode"
                      android:name="com.connecthub.app.MainActivity"
                      android:label="@string/title_activity_main"
                      android:launchMode="singleTask"
                      android:supportsPictureInPicture="true"
                      android:theme="@style/AppTheme.NoActionBarLaunch"
                      android:exported="true">

                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>

                  </activity>

                  <provider
                      android:name="androidx.core.content.FileProvider"
                      android:authorities="${applicationId}.fileprovider"
                      android:exported="false"
                      android:grantUriPermissions="true">
                      <meta-data
                          android:name="android.support.FILE_PROVIDER_PATHS"
                          android:resource="@xml/file_paths" />
                  </provider>

              </application>
          </manifest>
          EOF

      - name: Patch build.gradle
        run: |
          sed -i 's/compileSdkVersion .*/compileSdkVersion 34/' android/app/build.gradle
          sed -i 's/targetSdkVersion .*/targetSdkVersion 34/' android/app/build.gradle
          sed -i 's/minSdkVersion .*/minSdkVersion 23/' android/app/build.gradle

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Generate keystore
        run: |
          keytool -genkeypair \
            -keystore connecthub.keystore \
            -alias connecthub \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass connecthub123 \
            -keypass connecthub123 \
            -dname "CN=ConnectHub, OU=Dev, O=ConnectHub, L=Unknown, ST=Unknown, C=US" \
            -noprompt

      - name: Configure signing
        run: |
          cp connecthub.keystore android/app/connecthub.keystore
          cat >> android/app/build.gradle << 'EOF'
          android {
              signingConfigs {
                  release {
                      storeFile file('connecthub.keystore')
                      storePassword 'connecthub123'
                      keyAlias 'connecthub'
                      keyPassword 'connecthub123'
                  }
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                      minifyEnabled false
                  }
              }
          }
          EOF

      - name: Build APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: connecthub-apk
          path: android/app/build/outputs/apk/release/app-release.apk
