name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Install expect
        run: sudo apt-get install -y expect

      - name: Create twa directory
        run: mkdir -p ./twa

      - name: Init Bubblewrap project
        run: |
          cat > /tmp/bubblewrap_init.exp << 'EOF'
          #!/usr/bin/expect -f
          set timeout 600

          spawn bubblewrap init --manifest https://connecthub40.pages.dev/manifest.json --directory ./twa

          expect "install the JDK"
          send "y\r"

          expect "install the Android SDK"
          send "y\r"

          expect "agree to the Android SDK"
          send "y\r"

          expect "? Domain:"
          send "connecthub40.pages.dev\r"

          expect "? URL path:"
          send "/\r"

          expect "? Application name:"
          send "ConnectHub\r"

          expect "? Short name:"
          send "ConnectHub\r"

          expect "? Application ID:"
          send "com.connecthub.app\r"

          expect "? Starting version code"
          send "1\r"

          expect "? Display mode:"
          send "\r"

          expect "? Orientation:"
          send "\r"

          expect "? Status bar color:"
          send "\r"

          expect "? Theme Color:"
          send "\r"

          expect "? Background color:"
          send "\r"

          expect "? Icon URL:"
          send "\r"

          expect "? Maskable icon URL:"
          send "\r"

          expect "? Monochrome icon URL:"
          send "\r"

          expect "? Enable Play Billing"
          send "\r"

          expect "? Enable Location Delegation"
          send "\r"

          expect "? Key store location:"
          send "./android.keystore\r"

          expect "? Key name:"
          send "android\r"

          expect "create a signing key"
          send "y\r"

          expect "? First and Last names:"
          send "ConnectHub Dev\r"

          expect "? Organizational Unit:"
          send "Dev\r"

          expect "? Organization:"
          send "ConnectHub\r"

          expect "? Country Code:"
          send "US\r"

          expect "? Password for the Key Store"
          send "connecthub123\r"

          expect "? Password for the Key:"
          send "connecthub123\r"

          expect eof
          EOF
          chmod +x /tmp/bubblewrap_init.exp
          /tmp/bubblewrap_init.exp
          ls -la twa || echo "twa directory not created!"
        env:
          BUBBLEWRAP_DISABLE_TELEMETRY: true

      - name: Build APK
        run: |
          cat > /tmp/bubblewrap_build.exp << 'EOF'
          #!/usr/bin/expect -f
          set timeout 600
          spawn sh -c "cd twa && bubblewrap build"
          expect {
            "Password for the Key Store:" { send "connecthub123\r"; exp_continue }
            "Password for the Key:"       { send "connecthub123\r"; exp_continue }
            "license"                     { send "y\r"; exp_continue }
            eof
          }
          EOF
          chmod +x /tmp/bubblewrap_build.exp
          /tmp/bubblewrap_build.exp
        env:
          BUBBLEWRAP_DISABLE_TELEMETRY: true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: connecthub-apk
          path: twa/*.apk
