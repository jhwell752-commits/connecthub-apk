name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Create twa directory and manifest
        run: |
          mkdir -p ./twa
          cat > ./twa/twa-manifest.json << 'EOF'
          {
            "packageId": "com.connecthub.app",
            "host": "connecthub40.pages.dev",
            "name": "ConnectHub",
            "launcherName": "ConnectHub",
            "display": "standalone",
            "orientation": "portrait-primary",
            "themeColor": "#0A0A0A",
            "backgroundColor": "#FFFC00",
            "enableNotifications": false,
            "startUrl": "/",
            "iconUrl": "https://connecthub40.pages.dev/icon-512.png",
            "maskableIconUrl": "https://connecthub40.pages.dev/icon-512.png",
            "appVersionCode": 1,
            "appVersionName": "1",
            "shortcuts": [],
            "generatorApp": "bubblewrap-cli",
            "webManifestUrl": "https://connecthub40.pages.dev/manifest.json",
            "fallbackType": "customtabs",
            "features": {},
            "alphaDependencies": {"enabled": false},
            "enableSiteSettingsShortcut": true,
            "isChromeOSOnly": false,
            "isMetaQuest": false,
            "fullScopeUrl": "https://connecthub40.pages.dev/",
            "minSdkVersion": 24,
            "signingKey": {
              "path": "./android.keystore",
              "alias": "android"
            }
          }
          EOF

      - name: Install expect
        run: sudo apt-get install -y expect

      - name: Generate project from manifest
        run: |
          cd twa
          bubblewrap update
        env:
          BUBBLEWRAP_DISABLE_TELEMETRY: true

      - name: Build APK
        run: |
          cat > /tmp/bubblewrap_build.exp << 'EOF'
          #!/usr/bin/expect -f
          set timeout 600
          spawn sh -c "cd twa && bubblewrap build"
          expect {
            "install the JDK"              { send "y\r"; exp_continue }
            "install the Android SDK"      { send "y\r"; exp_continue }
            "agree to the Android SDK"     { send "y\r"; exp_continue }
            "create a signing key"         { send "y\r"; exp_continue }
            "First and Last names:"        { send "ConnectHub Dev\r"; exp_continue }
            "Organizational Unit:"         { send "Dev\r"; exp_continue }
            "Organization:"                { send "ConnectHub\r"; exp_continue }
            "Country Code:"                { send "US\r"; exp_continue }
            "Password for the Key Store"   { send "connecthub123\r"; exp_continue }
            "Password for the Key:"        { send "connecthub123\r"; exp_continue }
            eof
          }
          EOF
          chmod +x /tmp/bubblewrap_build.exp
          /tmp/bubblewrap_build.exp
        env:
          BUBBLEWRAP_DISABLE_TELEMETRY: true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: connecthub-apk
          path: twa/*.apk
