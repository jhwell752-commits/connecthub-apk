name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Create twa directory and manifest
        run: |
          mkdir -p ./twa

          # Write twa-manifest.json directly — skips ALL interactive prompts
          cat > ./twa/twa-manifest.json << 'EOF'
          {
            "packageId": "com.connecthub.app",
            "host": "connecthub40.pages.dev",
            "name": "ConnectHub",
            "launcherName": "ConnectHub",
            "display": "standalone",
            "orientation": "default",
            "themeColor": "#000000",
            "navigationColor": "#000000",
            "navigationColorDark": "#000000",
            "navigationDividerColor": "#000000",
            "navigationDividerColorDark": "#000000",
            "backgroundColor": "#ffffff",
            "enableNotifications": false,
            "startUrl": "/",
            "iconUrl": "https://connecthub40.pages.dev/icon-512.png",
            "maskableIconUrl": "https://connecthub40.pages.dev/icon-512.png",
            "monochromeIconUrl": "https://connecthub40.pages.dev/icon-512.png",
            "splashScreenFadeOutDuration": 300,
            "signingKey": {
              "path": "./android.keystore",
              "alias": "android"
            },
            "appVersionCode": 1,
            "appVersionName": "1.0.0",
            "shortcuts": [],
            "generatorApp": "bubblewrap-cli",
            "webManifestUrl": "https://connecthub40.pages.dev/manifest.json",
            "fallbackType": "customtabs",
            "features": {
              "locationDelegation": { "enabled": false },
              "playBilling": { "enabled": false }
            },
            "alphaDependencies": { "enabled": false },
            "enableSiteSettingsShortcut": true,
            "isChromeOSOnly": false,
            "isMetaQuest": false,
            "fullScopeUrl": "https://connecthub40.pages.dev/",
            "minSdkVersion": 19,
            "targetSdkVersion": 32
          }
          EOF

      - name: Generate signing keystore
        run: |
          keytool -genkeypair \
            -keystore ./twa/android.keystore \
            -alias android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass connecthub123 \
            -keypass connecthub123 \
            -dname "CN=ConnectHub Dev, OU=Dev, O=ConnectHub, L=Unknown, ST=Unknown, C=US" \
            -noprompt

      - name: Build APK
        working-directory: ./twa
        run: |
          # bubblewrap build reads twa-manifest.json and uses the keystore
          # JAVA_HOME is already set by setup-java; pass passwords via env
          bubblewrap build \
            --skipPwaValidation
        env:
          BUBBLEWRAP_DISABLE_TELEMETRY: '1'
          # bubblewrap reads these env vars for keystore passwords
          BUBBLEWRAP_KEY_STORE_PASSWORD: connecthub123
          BUBBLEWRAP_KEY_PASSWORD: connecthub123

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: connecthub-apk
          path: twa/*.apk
