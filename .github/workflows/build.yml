name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Install expect
        run: sudo apt-get install -y expect

      - name: Init Bubblewrap project
        run: |
          cat > /tmp/bubblewrap_init.exp << 'EOF'
          #!/usr/bin/expect -f
          set timeout 600
          spawn bubblewrap init --manifest https://connecthub40.pages.dev/manifest.json --directory ./twa
          expect {
            "install the JDK"              { send "y\r"; exp_continue }
            "install the Android SDK"      { send "y\r"; exp_continue }
            "agree to the Android SDK"     { send "y\r"; exp_continue }
            "Domain:"                      { send "connecthub40.pages.dev\r"; exp_continue }
            "URL path:"                    { send "/\r"; exp_continue }
            "Application ID:"              { send "com.connecthub.app\r"; exp_continue }
            "App name:"                    { send "ConnectHub\r"; exp_continue }
            "Display mode:"                { send "\r"; exp_continue }
            "Orientation:"                 { send "\r"; exp_continue }
            "theme color"                  { send "\r"; exp_continue }
            "background color"             { send "\r"; exp_continue }
            "Splash screen color:"         { send "\r"; exp_continue }
            "Icon URL:"                    { send "\r"; exp_continue }
            "Maskable icon URL:"           { send "\r"; exp_continue }
            "Monochrome icon URL:"         { send "\r"; exp_continue }
            "shortcuts"                    { send "\r"; exp_continue }
            "create one now"               { send "y\r"; exp_continue }
            "First and Last names"         { send "ConnectHub Dev\r"; exp_continue }
            "Organizational Unit"          { send "Dev\r"; exp_continue }
            "Organization"                 { send "ConnectHub\r"; exp_continue }
            "Country"                      { send "US\r"; exp_continue }
            "Password for the Key Store:"  { send "connecthub123\r"; exp_continue }
            "Password for the Key:"        { send "connecthub123\r"; exp_continue }
            "Key name:"                    { send "android\r"; exp_continue }
            "Key store location:"          { send "./android.keystore\r"; exp_continue }
            eof
          }
          EOF
          chmod +x /tmp/bubblewrap_init.exp
          /tmp/bubblewrap_init.exp
          ls -la twa || echo "twa directory not created!"
        env:
          BUBBLEWRAP_DISABLE_TELEMETRY: true

      - name: Build APK
        run: |
          cat > /tmp/bubblewrap_build.exp << 'EOF'
          #!/usr/bin/expect -f
          set timeout 600
          spawn sh -c "cd twa && bubblewrap build"
          expect {
            "Password for the Key Store:" { send "connecthub123\r"; exp_continue }
            "Password for the Key:"       { send "connecthub123\r"; exp_continue }
            "license"                     { send "y\r"; exp_continue }
            eof
          }
          EOF
          chmod +x /tmp/bubblewrap_build.exp
          /tmp/bubblewrap_build.exp
        env:
          BUBBLEWRAP_DISABLE_TELEMETRY: true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: connecthub-apk
          path: twa/*.apk
