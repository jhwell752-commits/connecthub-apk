name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Install expect
        run: sudo apt-get install -y expect

      - name: Init Bubblewrap project
        run: |
          expect -c '
            set timeout 300
            spawn bubblewrap init --manifest https://connecthub40.pages.dev/manifest.json --directory ./twa
            expect "Y/n" { send "y\r" }
            expect "Y/n" { send "y\r" }
            expect "Application ID:" { send "com.connecthub.app\r" }
            expect eof
          '
          ls -la
          ls -la twa || echo "twa directory not created!"
        env:
          BUBBLEWRAP_DISABLE_TELEMETRY: true

      - name: Build APK
        run: |
          cd twa
          yes | bubblewrap build
        env:
          BUBBLEWRAP_DISABLE_TELEMETRY: true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: connecthub-apk
          path: twa/*.apk
