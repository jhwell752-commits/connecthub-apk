name: Build APK (Capacitor)

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: |
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Write Capacitor config
        run: |
          cat > capacitor.config.json << 'EOF'
          {
            "appId": "com.connecthub.app",
            "appName": "ConnectHub",
            "webDir": "www",
            "android": {
              "allowMixedContent": true,
              "backgroundColor": "#ffffff",
              "captureInput": true
            },
            "server": {
              "androidScheme": "https"
            },
            "plugins": {
              "CapacitorHttp": {
                "enabled": true
              }
            }
          }
          EOF

      - name: Prepare web assets
        run: |
          mkdir -p www
          cp index.html www/index.html

      - name: Add Android platform
        run: |
          npx cap init "ConnectHub" "com.connecthub.app" --web-dir www
          npx cap add android

      - name: Upgrade Gradle wrapper to 8.7
        run: |
          sed -i 's|gradle-[0-9.]*-all|gradle-8.7-all|g' android/gradle/wrapper/gradle-wrapper.properties
          grep distributionUrl android/gradle/wrapper/gradle-wrapper.properties

      # ── Patch AndroidManifest using Python to avoid duplicate attribute errors ──
      - name: Patch AndroidManifest
        run: |
          python3 << 'PYEOF'
          import xml.etree.ElementTree as ET

          ET.register_namespace('android', 'http://schemas.android.com/apk/res/android')
          ET.register_namespace('tools', 'http://schemas.android.com/tools')
          ET.register_namespace('', 'http://schemas.android.com/apk/res/android')

          MANIFEST = 'android/app/src/main/AndroidManifest.xml'
          NS = 'http://schemas.android.com/apk/res/android'

          tree = ET.parse(MANIFEST)
          root = tree.getroot()

          # Add permissions after <uses-permission INTERNET> if not already present
          needed_perms = [
              'android.permission.CAMERA',
              'android.permission.RECORD_AUDIO',
              'android.permission.MODIFY_AUDIO_SETTINGS',
              'android.permission.FOREGROUND_SERVICE',
              'android.permission.WAKE_LOCK',
          ]
          existing = {el.get(f'{{{NS}}}name') for el in root.findall('uses-permission')}
          insert_idx = 0
          children = list(root)
          for i, child in enumerate(children):
              if child.tag == 'uses-permission':
                  insert_idx = i + 1
          for perm in needed_perms:
              if perm not in existing:
                  el = ET.Element('uses-permission')
                  el.set(f'{{{NS}}}name', perm)
                  root.insert(insert_idx, el)
                  insert_idx += 1

          # Patch the activity element
          for app in root.findall('application'):
              for activity in app.findall('activity'):
                  # Add supportsPictureInPicture
                  if not activity.get(f'{{{NS}}}supportsPictureInPicture'):
                      activity.set(f'{{{NS}}}supportsPictureInPicture', 'true')
                  # Append PiP-required config changes without duplicating
                  pip_changes = 'screenSize|smallestScreenSize|screenLayout|orientation'
                  existing_changes = activity.get(f'{{{NS}}}configChanges', '')
                  for change in pip_changes.split('|'):
                      if change not in existing_changes:
                          existing_changes = (existing_changes + '|' + change).strip('|')
                  activity.set(f'{{{NS}}}configChanges', existing_changes)

          # Write back preserving declaration
          tree.write(MANIFEST, xml_declaration=True, encoding='utf-8')
          print("Manifest patched successfully")
          PYEOF

      - name: Patch build.gradle
        run: |
          sed -i 's/compileSdkVersion .*/compileSdkVersion 34/' android/app/build.gradle
          sed -i 's/targetSdkVersion .*/targetSdkVersion 34/' android/app/build.gradle
          sed -i 's/minSdkVersion .*/minSdkVersion 23/' android/app/build.gradle

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Generate keystore
        run: |
          keytool -genkeypair \
            -keystore connecthub.keystore \
            -alias connecthub \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass connecthub123 \
            -keypass connecthub123 \
            -dname "CN=ConnectHub, OU=Dev, O=ConnectHub, L=Unknown, ST=Unknown, C=US" \
            -noprompt

      - name: Configure signing
        run: |
          cp connecthub.keystore android/app/connecthub.keystore
          cat >> android/app/build.gradle << 'EOF'
          android {
              signingConfigs {
                  release {
                      storeFile file('connecthub.keystore')
                      storePassword 'connecthub123'
                      keyAlias 'connecthub'
                      keyPassword 'connecthub123'
                  }
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                      minifyEnabled false
                  }
              }
          }
          EOF

      - name: Build APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: connecthub-apk
          path: android/app/build/outputs/apk/release/app-release.apk
