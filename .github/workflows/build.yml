name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Init Bubblewrap project
        run: |
          yes | bubblewrap init \
            --manifest https://connecthub40.pages.dev/manifest.json \
            --directory ./twa
        env:
          BUBBLEWRAP_DISABLE_TELEMETRY: true

      - name: Build APK
        run: |
          cd twa
          yes | bubblewrap build
        env:
          BUBBLEWRAP_DISABLE_TELEMETRY: true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: connecthub-apk
          path: twa/*.apk
