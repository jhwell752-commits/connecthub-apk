name: Build APK (Capacitor)

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # ── Install Capacitor CLI + Android platform ──
      - name: Install dependencies
        run: |
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android

      # ── Write capacitor.config.json ──
      - name: Write Capacitor config
        run: |
          cat > capacitor.config.json << 'EOF'
          {
            "appId": "com.connecthub.app",
            "appName": "ConnectHub",
            "webDir": "www",
            "android": {
              "allowMixedContent": true,
              "backgroundColor": "#ffffff",
              "captureInput": true
            },
            "server": {
              "androidScheme": "https"
            },
            "plugins": {
              "CapacitorHttp": {
                "enabled": true
              }
            }
          }
          EOF

      # ── Put your index.html into the www folder ──
      - name: Prepare web assets
        run: |
          mkdir -p www
          cp index.html www/index.html

      # ── Init and add Android platform ──
      - name: Add Android platform
        run: |
          npx cap init "ConnectHub" "com.connecthub.app" --web-dir www
          npx cap add android

      # ── Patch AndroidManifest for PiP + camera + mic + background ──
      - name: Patch AndroidManifest
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          # Add PiP support to the main activity
          sed -i 's/android:launchMode="singleTask"/android:launchMode="singleTask"\n            android:supportsPictureInPicture="true"\n            android:configChanges="screenSize|smallestScreenSize|screenLayout|orientation"/' $MANIFEST
          # Add permissions if not already present
          sed -i '/<uses-permission android:name="android.permission.INTERNET"/a \
              <uses-permission android:name="android.permission.CAMERA" />\
              <uses-permission android:name="android.permission.RECORD_AUDIO" />\
              <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS" />\
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />\
              <uses-permission android:name="android.permission.WAKE_LOCK" />' $MANIFEST

      # ── Patch build.gradle to target SDK 34 ──
      - name: Patch build.gradle
        run: |
          sed -i 's/compileSdkVersion .*/compileSdkVersion 34/' android/app/build.gradle
          sed -i 's/targetSdkVersion .*/targetSdkVersion 34/' android/app/build.gradle
          sed -i 's/minSdkVersion .*/minSdkVersion 23/' android/app/build.gradle

      # ── Sync web assets into Android project ──
      - name: Sync Capacitor
        run: npx cap sync android

      # ── Generate signing keystore ──
      - name: Generate keystore
        run: |
          keytool -genkeypair \
            -keystore connecthub.keystore \
            -alias connecthub \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass connecthub123 \
            -keypass connecthub123 \
            -dname "CN=ConnectHub, OU=Dev, O=ConnectHub, L=Unknown, ST=Unknown, C=US" \
            -noprompt

      # ── Write signing config into gradle ──
      - name: Configure signing
        run: |
          cp connecthub.keystore android/app/connecthub.keystore
          cat >> android/app/build.gradle << 'EOF'

          android {
              signingConfigs {
                  release {
                      storeFile file('connecthub.keystore')
                      storePassword 'connecthub123'
                      keyAlias 'connecthub'
                      keyPassword 'connecthub123'
                  }
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                      minifyEnabled false
                  }
              }
          }
          EOF

      # ── Build the APK ──
      - name: Build APK
        working-directory: android
        run: ./gradlew assembleRelease

      # ── Upload APK artifact ──
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: connecthub-apk
          path: android/app/build/outputs/apk/release/app-release.apk
