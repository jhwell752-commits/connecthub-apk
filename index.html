<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="theme-color" content="#0a0a0f"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="PuffTrack"/>
<title>PuffTrack — Quit Vaping</title>
<link rel="manifest" href="data:application/manifest+json;base64,eyJuYW1lIjoiUHVmZlRyYWNrIiwic2hvcnRfbmFtZSI6IlB1ZmZUcmFjayIsInN0YXJ0X3VybCI6Ii4iLCJkaXNwbGF5Ijoic3RhbmRhbG9uZSIsImJhY2tncm91bmRfY29sb3IiOiIjMGEwYTBmIiwidGhlbWVfY29sb3IiOiIjMGEwYTBmIn0="/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0a0a0f;
    --surface:#111118;
    --surface2:#1a1a24;
    --surface3:#22222f;
    --border:#2a2a3a;
    --text:#f0eef8;
    --muted:#7a7a9a;
    --accent:#7c6aff;
    --accent2:#ff6b6b;
    --accent3:#6bffb8;
    --warn:#ffb347;
    --light-vaper:#6bffb8;
    --mid-vaper:#ffb347;
    --heavy-vaper:#ff6b6b;
  }
  html,body{height:100%;overflow-x:hidden}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'DM Mono',monospace;
    min-height:100dvh;
    display:flex;
    flex-direction:column;
    position:relative;
    overflow-y:auto;
  }
  /* Ambient glow bg */
  body::before{
    content:'';
    position:fixed;
    top:-30%;left:-20%;
    width:60%;height:60%;
    background:radial-gradient(ellipse,rgba(124,106,255,0.07) 0%,transparent 70%);
    pointer-events:none;
    z-index:0;
  }
  body::after{
    content:'';
    position:fixed;
    bottom:-20%;right:-20%;
    width:50%;height:50%;
    background:radial-gradient(ellipse,rgba(255,107,107,0.05) 0%,transparent 70%);
    pointer-events:none;
    z-index:0;
  }

  .app{
    position:relative;z-index:1;
    display:flex;flex-direction:column;
    min-height:100dvh;
    padding:env(safe-area-inset-top,0px) env(safe-area-inset-right,0px) env(safe-area-inset-bottom,0px) env(safe-area-inset-left,0px);
    max-width:480px;
    margin:0 auto;
    width:100%;
    padding-bottom:24px;
  }

  /* Header */
  .header{
    display:flex;justify-content:space-between;align-items:center;
    padding:20px 24px 8px;
  }
  .logo{font-family:'Syne',sans-serif;font-weight:800;font-size:20px;letter-spacing:-0.5px;color:var(--text)}
  .logo span{color:var(--accent)}
  .day-badge{
    font-size:11px;letter-spacing:1px;text-transform:uppercase;
    color:var(--muted);padding:5px 12px;
    border:1px solid var(--border);
    border-radius:20px;background:var(--surface);
  }

  /* Date bar */
  .date-bar{
    padding:4px 24px 16px;
    font-size:12px;color:var(--muted);letter-spacing:0.5px;
  }

  /* Vaper level banner */
  .vaper-level{
    margin:0 20px 16px;
    padding:12px 16px;
    border-radius:14px;
    border:1px solid var(--border);
    background:var(--surface);
    display:flex;align-items:center;gap:12px;
    transition:all 0.4s ease;
  }
  .level-dot{
    width:10px;height:10px;border-radius:50%;
    flex-shrink:0;
    box-shadow:0 0 8px currentColor;
  }
  .level-label{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);flex:1}
  .level-name{font-family:'Syne',sans-serif;font-weight:700;font-size:15px}

  /* Main counter card */
  .counter-card{
    margin:0 20px 16px;
    padding:32px 24px 28px;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:24px;
    display:flex;flex-direction:column;align-items:center;
    position:relative;overflow:hidden;
  }
  .counter-card::before{
    content:'';
    position:absolute;top:0;left:0;right:0;height:2px;
    background:linear-gradient(90deg,transparent,var(--accent),transparent);
    opacity:0.6;
  }

  .stats-row{
    display:flex;gap:32px;align-items:flex-end;margin-bottom:28px;
  }
  .stat-block{text-align:center}
  .stat-number{
    font-family:'Syne',sans-serif;font-weight:800;font-size:64px;
    line-height:1;color:var(--text);
    transition:transform 0.15s cubic-bezier(0.34,1.56,0.64,1),color 0.3s;
  }
  .stat-number.pop{transform:scale(1.18)}
  .stat-label{font-size:11px;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;margin-top:4px}
  .stat-divider{width:1px;height:48px;background:var(--border);margin-bottom:18px}
  .stat-number.nicotine{font-size:42px;color:var(--accent)}

  /* Plus button */
  .plus-btn{
    width:88px;height:88px;border-radius:50%;
    border:none;cursor:pointer;
    background:var(--accent);
    color:#fff;
    font-size:40px;line-height:1;
    display:flex;align-items:center;justify-content:center;
    position:relative;
    transition:transform 0.15s cubic-bezier(0.34,1.56,0.64,1),box-shadow 0.2s;
    box-shadow:0 0 24px rgba(124,106,255,0.4);
    -webkit-tap-highlight-color:transparent;
    user-select:none;
    margin-bottom:6px;
  }
  .plus-btn:active{transform:scale(0.9);box-shadow:0 0 8px rgba(124,106,255,0.2)}
  .plus-btn::after{
    content:'';
    position:absolute;inset:-4px;
    border-radius:50%;
    border:1px solid rgba(124,106,255,0.3);
    animation:pulse 2.5s infinite;
  }
  @keyframes pulse{
    0%,100%{opacity:0.6;transform:scale(1)}
    50%{opacity:0;transform:scale(1.25)}
  }
  .add-label{font-size:11px;letter-spacing:1px;color:var(--muted);text-transform:uppercase}

  /* Limit bar */
  .limit-section{margin:0 20px 16px}
  .limit-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
  .limit-title{font-size:11px;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase}
  .limit-value{font-family:'Syne',sans-serif;font-weight:700;font-size:15px;color:var(--accent)}
  .progress-track{
    height:6px;background:var(--surface2);
    border-radius:99px;overflow:hidden;
    position:relative;
  }
  .progress-fill{
    height:100%;border-radius:99px;
    transition:width 0.4s cubic-bezier(0.4,0,0.2,1),background 0.4s;
    background:var(--accent3);
  }
  .limit-adjust{
    display:flex;align-items:center;gap:12px;margin-top:12px;
  }
  .limit-adjust label{font-size:12px;color:var(--muted);flex-shrink:0}
  .limit-slider{
    flex:1;
    -webkit-appearance:none;appearance:none;
    height:4px;background:var(--surface3);
    border-radius:99px;outline:none;cursor:pointer;
  }
  .limit-slider::-webkit-slider-thumb{
    -webkit-appearance:none;
    width:20px;height:20px;border-radius:50%;
    background:var(--accent);
    border:2px solid var(--bg);
    cursor:pointer;
    box-shadow:0 0 8px rgba(124,106,255,0.5);
  }
  .limit-input-wrap{display:flex;align-items:center;gap:6px}
  .limit-num{
    width:48px;text-align:center;
    background:var(--surface2);border:1px solid var(--border);
    color:var(--text);border-radius:8px;
    padding:4px 8px;font-size:14px;font-family:'DM Mono',monospace;
    -moz-appearance:textfield;
  }
  .limit-num::-webkit-outer-spin-button,.limit-num::-webkit-inner-spin-button{-webkit-appearance:none}

  /* Timer card */
  .timer-card{
    margin:0 20px 16px;
    padding:18px 20px;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:18px;
  }
  .timer-title{font-size:11px;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;margin-bottom:10px}
  .timer-display{
    font-family:'Syne',sans-serif;font-weight:700;
    font-size:28px;letter-spacing:-0.5px;
    color:var(--text);
  }
  .timer-display span{color:var(--muted);font-size:14px;font-weight:400;margin-left:2px}

  /* Records row */
  .records-row{
    display:grid;grid-template-columns:1fr 1fr;gap:12px;
    margin:0 20px 16px;
  }
  .record-card{
    padding:16px;background:var(--surface);
    border:1px solid var(--border);border-radius:16px;
  }
  .record-icon{font-size:18px;margin-bottom:6px}
  .record-label{font-size:10px;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;margin-bottom:4px}
  .record-val{font-family:'Syne',sans-serif;font-weight:700;font-size:22px}
  .record-val.best{color:var(--accent3)}
  .record-val.worst{color:var(--accent2)}
  .record-date{font-size:10px;color:var(--muted);margin-top:2px}

  /* History */
  .history-section{margin:0 20px}
  .history-title{font-size:11px;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;margin-bottom:10px}
  .history-list{display:flex;flex-direction:column;gap:6px}
  .history-item{
    display:flex;align-items:center;gap:10px;
    padding:10px 14px;
    background:var(--surface);border:1px solid var(--border);
    border-radius:12px;
  }
  .hist-day{font-size:12px;color:var(--muted);width:72px;flex-shrink:0}
  .hist-bar-wrap{flex:1;height:4px;background:var(--surface3);border-radius:99px;overflow:hidden}
  .hist-bar{height:100%;border-radius:99px;transition:width 0.5s}
  .hist-count{font-family:'Syne',sans-serif;font-weight:700;font-size:14px;min-width:32px;text-align:right}

  /* Reset btn */
  .reset-btn{
    margin:16px 20px 0;
    padding:14px;width:calc(100% - 40px);
    background:transparent;border:1px solid var(--border);
    color:var(--muted);font-family:'DM Mono',monospace;
    font-size:12px;letter-spacing:1px;text-transform:uppercase;
    border-radius:12px;cursor:pointer;
    transition:all 0.2s;
    -webkit-tap-highlight-color:transparent;
  }
  .reset-btn:active{background:var(--surface2);color:var(--accent2)}

  .ripple{
    position:fixed;border-radius:50%;
    background:rgba(124,106,255,0.25);
    pointer-events:none;
    transform:scale(0);
    animation:ripple-anim 0.6s linear forwards;
    z-index:9999;
  }
  @keyframes ripple-anim{
    to{transform:scale(4);opacity:0}
  }
  .over-limit .plus-btn{background:var(--accent2);box-shadow:0 0 24px rgba(255,107,107,0.4)}
  .over-limit .plus-btn::after{border-color:rgba(255,107,107,0.3)}
</style>
</head>
<body>
<div class="app" id="app">

  <div class="header">
    <div class="logo">Puff<span>Track</span></div>
    <div class="day-badge" id="dayBadge">Day 1</div>
  </div>
  <div class="date-bar" id="dateBar"></div>

  <div class="vaper-level" id="vaperLevel">
    <div class="level-dot" id="levelDot"></div>
    <div class="level-label">vaper level</div>
    <div class="level-name" id="levelName">—</div>
  </div>

  <!-- Main counter -->
  <div class="counter-card" id="counterCard">
    <div class="stats-row">
      <div class="stat-block">
        <div class="stat-number" id="puffCount">0</div>
        <div class="stat-label">puffs today</div>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-block">
        <div class="stat-number nicotine" id="nicotineCount">0.0</div>
        <div class="stat-label">mg nicotine</div>
      </div>
    </div>
    <button class="plus-btn" id="plusBtn" aria-label="Add puff">+</button>
    <div class="add-label">tap to count a puff</div>
  </div>

  <!-- Limit -->
  <div class="limit-section">
    <div class="limit-header">
      <div class="limit-title">daily limit</div>
      <div class="limit-value" id="limitDisplay">20 puffs</div>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
    <div class="limit-adjust">
      <label>goal</label>
      <input type="range" class="limit-slider" id="limitSlider" min="1" max="500" value="20" step="1"/>
      <div class="limit-input-wrap">
        <input type="number" class="limit-num" id="limitNum" value="20" min="1" max="500"/>
      </div>
    </div>
  </div>

  <!-- Timer -->
  <div class="timer-card">
    <div class="timer-title">time since last puff</div>
    <div class="timer-display" id="timerDisplay">
      no puffs yet today
    </div>
  </div>

  <!-- Records -->
  <div class="records-row">
    <div class="record-card">
      <div class="record-icon">🏅</div>
      <div class="record-label">best day</div>
      <div class="record-val best" id="bestVal">—</div>
      <div class="record-date" id="bestDate">no data</div>
    </div>
    <div class="record-card">
      <div class="record-icon">🔥</div>
      <div class="record-label">most puffs</div>
      <div class="record-val worst" id="worstVal">—</div>
      <div class="record-date" id="worstDate">no data</div>
    </div>
  </div>

  <!-- History -->
  <div class="history-section">
    <div class="history-title">recent days</div>
    <div class="history-list" id="historyList"></div>
  </div>

  <button class="reset-btn" id="resetBtn">reset today's count</button>

</div>

<script>
const STORAGE_KEY = 'pufftrack_v2';

function todayKey(){
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function loadData(){
  try{return JSON.parse(localStorage.getItem(STORAGE_KEY))||{}}catch{return {}}
}
function saveData(d){localStorage.setItem(STORAGE_KEY,JSON.stringify(d))}

let data = loadData();
let today = todayKey();
if(!data[today]) data[today] = {puffs:0, lastPuff:null};

// Migrate old format
if(typeof data.puffs !== 'undefined'){
  const old = data.puffs;
  data = {};
  data[today] = {puffs:old, lastPuff:null};
}

let limit = parseInt(localStorage.getItem('pufftrack_limit')||'20',10);
let startDate = localStorage.getItem('pufftrack_startdate') || todayKey();
localStorage.setItem('pufftrack_startdate', startDate);

function getDayNumber(){
  const start = new Date(startDate);
  const now = new Date(todayKey());
  return Math.floor((now-start)/(86400000))+1;
}

function formatDate(key){
  if(!key) return '';
  const [y,m,d] = key.split('-');
  const date = new Date(y,m-1,d);
  return date.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});
}

function setVaperLevel(puffs){
  const dot = document.getElementById('levelDot');
  const name = document.getElementById('levelName');
  if(puffs === 0){
    dot.style.background='var(--muted)';
    name.textContent='clean';name.style.color='var(--muted)';
  } else if(puffs<100){
    dot.style.background='var(--light-vaper)';
    name.textContent='light vaper';name.style.color='var(--light-vaper)';
  } else if(puffs<=200){
    dot.style.background='var(--mid-vaper)';
    name.textContent='intermediate';name.style.color='var(--mid-vaper)';
  } else {
    dot.style.background='var(--heavy-vaper)';
    name.textContent='heavy vaper';name.style.color='var(--heavy-vaper)';
  }
}

function updateProgress(puffs){
  const pct = Math.min((puffs/limit)*100,100);
  const fill = document.getElementById('progressFill');
  fill.style.width = pct+'%';
  if(pct<60) fill.style.background='var(--accent3)';
  else if(pct<90) fill.style.background='var(--warn)';
  else fill.style.background='var(--accent2)';
  const card = document.getElementById('app');
  if(puffs>=limit) card.classList.add('over-limit');
  else card.classList.remove('over-limit');
}

function updateUI(){
  today = todayKey();
  if(!data[today]) data[today]={puffs:0,lastPuff:null};
  const puffs = data[today].puffs;
  const nic = (puffs*0.2).toFixed(1);

  document.getElementById('puffCount').textContent = puffs;
  document.getElementById('nicotineCount').textContent = nic;
  document.getElementById('dayBadge').textContent = 'Day '+getDayNumber();

  const now = new Date();
  document.getElementById('dateBar').textContent = now.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

  document.getElementById('limitDisplay').textContent = limit+' puffs';
  document.getElementById('limitSlider').value = limit;
  document.getElementById('limitNum').value = limit;

  updateProgress(puffs);
  setVaperLevel(puffs);
  updateRecords();
  renderHistory();
}

function updateRecords(){
  const keys = Object.keys(data).sort();
  if(keys.length===0) return;
  let best={key:null,val:Infinity}, worst={key:null,val:-Infinity};
  keys.forEach(k=>{
    const p = data[k].puffs||0;
    if(p < best.val){best={key:k,val:p}}
    if(p > worst.val){worst={key:k,val:p}}
  });
  document.getElementById('bestVal').textContent = best.val===Infinity ? '—' : best.val+' puffs';
  document.getElementById('bestDate').textContent = best.key ? formatDate(best.key) : 'no data';
  document.getElementById('worstVal').textContent = worst.val===-Infinity ? '—' : worst.val+' puffs';
  document.getElementById('worstDate').textContent = worst.key ? formatDate(worst.key) : 'no data';
}

function renderHistory(){
  const keys = Object.keys(data).sort().reverse().slice(0,7);
  const maxPuffs = Math.max(...keys.map(k=>data[k].puffs||0),1);
  const list = document.getElementById('historyList');
  list.innerHTML='';
  keys.forEach(k=>{
    const p = data[k].puffs||0;
    const pct = (p/maxPuffs)*100;
    let color = p<100 ? 'var(--accent3)' : p<=200 ? 'var(--warn)' : 'var(--accent2)';
    const item = document.createElement('div');
    item.className='history-item';
    item.innerHTML=`<div class="hist-day">${k===todayKey()?'Today':formatDate(k)}</div><div class="hist-bar-wrap"><div class="hist-bar" style="width:${pct}%;background:${color}"></div></div><div class="hist-count">${p}</div>`;
    list.appendChild(item);
  });
}

// Timer
function updateTimer(){
  today = todayKey();
  if(!data[today]) data[today]={puffs:0,lastPuff:null};
  const last = data[today].lastPuff;
  const el = document.getElementById('timerDisplay');
  if(!last){el.innerHTML='no puffs yet today';return;}
  const diff = Math.floor((Date.now()-last)/1000);
  const d = Math.floor(diff/86400);
  const h = Math.floor((diff%86400)/3600);
  const m = Math.floor((diff%3600)/60);
  const s = diff%60;
  let parts=[];
  if(d>0) parts.push(`${d}<span>d</span>`);
  parts.push(`${String(h).padStart(2,'0')}<span>h</span>`);
  parts.push(`${String(m).padStart(2,'0')}<span>m</span>`);
  parts.push(`${String(s).padStart(2,'0')}<span>s</span>`);
  el.innerHTML = parts.join(' ');
}

// Add puff
document.getElementById('plusBtn').addEventListener('click',function(e){
  today = todayKey();
  if(!data[today]) data[today]={puffs:0,lastPuff:null};
  data[today].puffs++;
  data[today].lastPuff = Date.now();
  saveData(data);

  // Pop animation
  const num = document.getElementById('puffCount');
  num.classList.remove('pop');
  void num.offsetWidth;
  num.classList.add('pop');
  setTimeout(()=>num.classList.remove('pop'),200);

  // Ripple
  const btn = this;
  const rect = btn.getBoundingClientRect();
  const size = Math.max(rect.width,rect.height);
  const r = document.createElement('div');
  r.className='ripple';
  r.style.cssText=`width:${size}px;height:${size}px;left:${rect.left+rect.width/2-size/2}px;top:${rect.top+rect.height/2-size/2}px`;
  document.body.appendChild(r);
  setTimeout(()=>r.remove(),700);

  updateUI();
  updateTimer();
});

// Limit controls
document.getElementById('limitSlider').addEventListener('input',function(){
  limit=parseInt(this.value,10);
  document.getElementById('limitNum').value=limit;
  localStorage.setItem('pufftrack_limit',limit);
  updateUI();
});
document.getElementById('limitNum').addEventListener('change',function(){
  let v=Math.max(1,Math.min(500,parseInt(this.value)||20));
  this.value=v;limit=v;
  document.getElementById('limitSlider').value=v;
  localStorage.setItem('pufftrack_limit',v);
  updateUI();
});

// Reset
document.getElementById('resetBtn').addEventListener('click',function(){
  if(!confirm('Reset today\'s puff count to 0?')) return;
  today = todayKey();
  data[today]={puffs:0,lastPuff:null};
  saveData(data);
  updateUI();
  updateTimer();
});

// Midnight rollover check
let currentDay = todayKey();
setInterval(()=>{
  const newDay = todayKey();
  if(newDay !== currentDay){currentDay=newDay;updateUI();}
},30000);

updateUI();
updateTimer();
setInterval(updateTimer,1000);
</script>
</body>
</html>
